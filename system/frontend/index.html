<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意图驱动的 P4 测试系统</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
    --text: #e4e4e7; --dim: #71717a; --accent: #6366f1; --accent-hover: #818cf8;
    --green: #22c55e; --red: #ef4444; --yellow: #eab308; --blue: #3b82f6;
    --sidebar-w: 280px; --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; display: flex; min-height: 100vh;
  }

  /* ---- Sidebar ---- */
  .sidebar {
    width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header .new-btn {
    font-size: 20px; cursor: pointer; color: var(--accent); background: none; border: none;
    line-height: 1;
  }
  .sidebar-header .new-btn:hover { color: var(--accent-hover); }
  .history-list { flex: 1; overflow-y: auto; padding: 8px; }
  .history-item {
    padding: 10px 12px; border-radius: var(--radius); cursor: pointer;
    margin-bottom: 4px; font-size: 13px; transition: background 0.1s;
  }
  .history-item:hover { background: rgba(99,102,241,0.1); }
  .history-item.active { background: rgba(99,102,241,0.18); border-left: 3px solid var(--accent); }
  .history-item .hi-prog { font-weight: 600; font-size: 12px; color: var(--accent); }
  .history-item .hi-intent { color: var(--dim); font-size: 12px; margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-item .hi-badges { margin-top: 4px; display: flex; gap: 4px; }
  .history-item .hi-time { font-size: 11px; color: var(--dim); margin-top: 2px; }

  /* ---- Main ---- */
  .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
  header {
    padding: 16px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--accent); color: #fff; }
  .taskid { font-family: monospace; font-size: 12px; color: var(--dim); margin-left: auto; }
  .container { max-width: 960px; margin: 0 auto; padding: 20px 28px; width: 100%; }

  .section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 22px; margin-bottom: 16px;
  }
  .section-title {
    font-size: 13px; font-weight: 600; color: var(--dim); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 12px;
  }
  select, textarea, input[type="text"] {
    width: 100%; padding: 9px 12px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-size: 14px; font-family: inherit;
  }
  textarea { resize: vertical; min-height: 70px; }
  select:focus, textarea:focus, input:focus { outline: none; border-color: var(--accent); }
  label.field-label { font-size: 12px; color: var(--dim); display: block; margin-bottom: 4px; margin-top: 10px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: var(--radius);
    border: none; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #3a3d4a; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-group { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px;
    text-align: center; cursor: pointer; transition: border-color 0.2s; margin-top: 10px;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); }
  .upload-zone input { display: none; }
  .upload-zone .icon { font-size: 28px; margin-bottom: 6px; }
  .upload-zone .label { font-size: 13px; color: var(--dim); }
  .upload-zone .filename { font-size: 13px; color: var(--accent); margin-top: 4px; }
  .compile-output { font-family: monospace; font-size: 12px; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 10px;
    margin-top: 8px; max-height: 120px; overflow-y: auto; white-space: pre-wrap; }

  /* Spec / TC / Test display */
  .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .spec-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 14px; min-height: 80px;
  }
  .spec-box label { font-size: 11px; color: var(--dim); display: block; margin-bottom: 4px; }
  .spec-box pre { font-size: 13px; white-space: pre-wrap; word-break: break-all; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-pass { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-fail { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-warn { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge-info { background: rgba(59,130,246,0.15); color: var(--blue); }
  .validation-row { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
  th { text-align: left; padding: 7px 9px; border-bottom: 2px solid var(--border); color: var(--dim); font-weight: 500; font-size: 12px; }
  td { padding: 7px 9px; border-bottom: 1px solid var(--border); }
  .scenario-block { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
  .scenario-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .scenario-header h4 { font-size: 13px; }
  .step-log { font-family: "SF Mono","Fira Code",monospace; font-size: 12px; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px;
    max-height: 250px; overflow-y: auto; }
  .step-line { padding: 2px 0; }
  .step-line .action { color: var(--accent); }
  .step-line .done { color: var(--green); }
  .step-line .error { color: var(--red); }
  .spinner { display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .verdict-box { padding: 14px; border-radius: var(--radius); margin-top: 10px; }
  .verdict-pass { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.3); }
  .verdict-fail { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); }
  .hidden { display: none; }

  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--dim); }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <span>历史记录</span>
    <button class="new-btn" title="新建任务" onclick="resetToNew()">+</button>
  </div>
  <div class="history-list" id="historyList">
    <div style="padding:12px;color:var(--dim);font-size:12px;">暂无记录</div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <header>
    <h1>意图驱动的 P4 测试系统</h1>
    <span class="tag">v1.1</span>
    <span id="taskIdDisplay" class="taskid"></span>
  </header>

  <div class="container">

    <!-- Section 1: Input -->
    <div class="section" id="inputSection">
      <div class="section-title">① 输入测试意图</div>

      <div class="tabs" id="inputTabs">
        <div class="tab active" data-tab="preset" onclick="switchInputTab('preset')">预置用例</div>
        <div class="tab" data-tab="upload" onclick="switchInputTab('upload')">上传 P4 程序</div>
      </div>

      <!-- Preset tab -->
      <div id="presetPanel">
        <select id="caseSelect"><option value="">加载中...</option></select>
        <textarea id="intentText" placeholder="选择用例后自动填充，也可以手动编辑..." style="margin-top:10px;"></textarea>
      </div>

      <!-- Upload tab -->
      <div id="uploadPanel" class="hidden">
        <label class="field-label">P4 源文件</label>
        <div class="upload-zone" id="p4DropZone" onclick="document.getElementById('p4FileInput').click()">
          <input type="file" id="p4FileInput" accept=".p4" onchange="onP4FileSelected(this)">
          <div class="icon">📄</div>
          <div class="label">点击或拖拽 .p4 文件到此处</div>
          <div class="filename" id="p4FileName"></div>
        </div>
        <label class="field-label">拓扑文件 (可选, topology.json)</label>
        <div class="upload-zone" id="topoDropZone" onclick="document.getElementById('topoFileInput').click()" style="padding:12px;">
          <input type="file" id="topoFileInput" accept=".json" onchange="onTopoFileSelected(this)">
          <div class="label" style="font-size:12px;">点击上传拓扑文件</div>
          <div class="filename" id="topoFileName"></div>
        </div>
        <label class="field-label">程序名称</label>
        <input type="text" id="uploadProgName" placeholder="留空则从文件名推断">
        <label class="field-label">测试意图</label>
        <textarea id="uploadIntent" placeholder="描述你想要测试的内容..."></textarea>

        <div class="btn-group">
          <button class="btn btn-secondary" id="btnUpload" onclick="uploadP4()">上传并编译</button>
        </div>
        <div id="compileResult" class="hidden">
          <div id="compileStatus" style="margin-top:8px;"></div>
          <div class="compile-output" id="compileOutput"></div>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="btnGenSpec" onclick="generateSpec()">生成 P4LTL 规范</button>
      </div>
    </div>

    <!-- Section 2: Spec -->
    <div class="section hidden" id="specSection">
      <div class="section-title">② 规范生成结果</div>
      <div class="spec-grid">
        <div class="spec-box"><label>原始意图</label><pre id="specIntent"></pre></div>
        <div class="spec-box"><label>P4LTL 规范</label><pre id="specText" style="color:var(--accent);"></pre></div>
      </div>
      <div class="validation-row" id="specValidation"></div>
      <div class="btn-group">
        <button class="btn btn-primary" id="btnGenTC" onclick="generateTestcases()">生成测试用例</button>
        <button class="btn btn-secondary btn-sm" onclick="copySpec()">复制规范</button>
      </div>
    </div>

    <!-- Section 3: Test Cases -->
    <div class="section hidden" id="tcSection">
      <div class="section-title">③ 测试用例</div>
      <div id="tcContent"></div>
      <div class="btn-group">
        <button class="btn btn-primary" id="btnRunTest" onclick="runAutoTest()">执行自动测试</button>
        <button class="btn btn-secondary btn-sm" onclick="exportTestcases()">导出 JSON</button>
      </div>
    </div>

    <!-- Section 4: Test Result -->
    <div class="section hidden" id="testSection">
      <div class="section-title">④ 自动测试执行与结果</div>
      <div id="testProgress" class="step-log"></div>
      <div id="testVerdict"></div>
    </div>

  </div>
</div>

<script>
let currentTaskId = null, currentTask = null, uploadedCaseId = null;

// ---- Init ----
async function init() {
  const resp = await fetch('/api/programs');
  const cases = await resp.json();
  const sel = document.getElementById('caseSelect');
  sel.innerHTML = '<option value="">— 请选择测试用例 —</option>';
  cases.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.case_id;
    opt.textContent = `[${c.program_name}] ${c.intent.substring(0, 60)}${c.intent.length > 60 ? '...' : ''}`;
    opt.dataset.intent = c.intent;
    sel.appendChild(opt);
  });
  sel.onchange = () => {
    const opt = sel.selectedOptions[0];
    if (opt && opt.dataset.intent) document.getElementById('intentText').value = opt.dataset.intent;
  };
  loadHistory();
}

// ---- Input tabs ----
function switchInputTab(tab) {
  document.querySelectorAll('#inputTabs .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('presetPanel').classList.toggle('hidden', tab !== 'preset');
  document.getElementById('uploadPanel').classList.toggle('hidden', tab !== 'upload');
}

// ---- Upload ----
function onP4FileSelected(input) {
  const f = input.files[0];
  document.getElementById('p4FileName').textContent = f ? f.name : '';
}
function onTopoFileSelected(input) {
  const f = input.files[0];
  document.getElementById('topoFileName').textContent = f ? f.name : '';
}

// Drag & drop
['p4DropZone','topoDropZone'].forEach(id => {
  const z = document.getElementById(id);
  z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('dragover'); });
  z.addEventListener('dragleave', () => z.classList.remove('dragover'));
  z.addEventListener('drop', e => {
    e.preventDefault(); z.classList.remove('dragover');
    const inputId = id === 'p4DropZone' ? 'p4FileInput' : 'topoFileInput';
    const fnId = id === 'p4DropZone' ? 'p4FileName' : 'topoFileName';
    const input = document.getElementById(inputId);
    input.files = e.dataTransfer.files;
    document.getElementById(fnId).textContent = e.dataTransfer.files[0]?.name || '';
  });
});

async function uploadP4() {
  const p4Input = document.getElementById('p4FileInput');
  if (!p4Input.files.length) { alert('请先选择 .p4 文件'); return; }

  setBtnLoading('btnUpload', true);
  const fd = new FormData();
  fd.append('p4_file', p4Input.files[0]);
  const topoInput = document.getElementById('topoFileInput');
  if (topoInput.files.length) fd.append('topology_file', topoInput.files[0]);
  fd.append('program_name', document.getElementById('uploadProgName').value);
  fd.append('intent', document.getElementById('uploadIntent').value);

  try {
    const resp = await fetch('/api/p4/upload', { method: 'POST', body: fd });
    const data = await resp.json();
    const resultDiv = document.getElementById('compileResult');
    resultDiv.classList.remove('hidden');
    const statusDiv = document.getElementById('compileStatus');
    if (data.compile_ok) {
      statusDiv.innerHTML = '<span class="badge badge-pass">✓ 编译成功</span>';
      uploadedCaseId = data.case_id;
    } else {
      statusDiv.innerHTML = '<span class="badge badge-fail">✗ 编译失败</span>';
    }
    document.getElementById('compileOutput').textContent = data.compile_output || '';
  } catch (e) {
    alert('上传失败: ' + e.message);
  }
  setBtnLoading('btnUpload', false);
}

// ---- Stage 1: Spec ----
async function generateSpec() {
  let caseId, intent;
  const activeTab = document.querySelector('#inputTabs .tab.active').dataset.tab;
  if (activeTab === 'upload') {
    if (!uploadedCaseId) { alert('请先上传并编译 P4 程序'); return; }
    caseId = uploadedCaseId;
    intent = document.getElementById('uploadIntent').value || null;
  } else {
    caseId = document.getElementById('caseSelect').value;
    intent = document.getElementById('intentText').value.trim() || null;
    if (!caseId) { alert('请先选择测试用例'); return; }
  }

  setBtnLoading('btnGenSpec', true);
  try {
    const resp = await fetch('/api/spec/generate', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ case_id: caseId, intent_override: intent }),
    });
    const task = await resp.json();
    currentTaskId = task.task_id; currentTask = task;
    document.getElementById('taskIdDisplay').textContent = 'Task: ' + task.task_id;
    showSpecResult(task);
    loadHistory();
  } catch (e) { alert('规范生成失败: ' + e.message); }
  setBtnLoading('btnGenSpec', false);
}

function showSpecResult(task) {
  document.getElementById('specSection').classList.remove('hidden');
  document.getElementById('specIntent').textContent = task.natural_language_intent;
  document.getElementById('specText').textContent = task.ltl_spec_text || '(未生成)';
  const vRow = document.getElementById('specValidation');
  vRow.innerHTML = '';
  if (task.spec_generation_ok === true) vRow.innerHTML += '<span class="badge badge-pass">✓ 生成成功</span>';
  else if (task.spec_generation_ok === false) vRow.innerHTML += '<span class="badge badge-warn">⚠ 未完全通过</span>';
}

// ---- Stage 2: Testcases ----
async function generateTestcases() {
  if (!currentTaskId) return;
  setBtnLoading('btnGenTC', true);
  try {
    const resp = await fetch('/api/testcase/generate', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ task_id: currentTaskId }),
    });
    currentTask = await resp.json();
    showTestcases(currentTask);
    loadHistory();
  } catch (e) { alert('测试用例生成失败: ' + e.message); }
  setBtnLoading('btnGenTC', false);
}

function showTestcases(task) {
  document.getElementById('tcSection').classList.remove('hidden');
  const content = document.getElementById('tcContent');
  const tcs = task.testcases || [];
  if (!tcs.length) { content.innerHTML = '<p style="color:var(--red);">未生成测试用例</p>'; return; }

  let html = `<p style="margin-bottom:10px;"><span class="badge badge-pass">✓ ${tcs.length} 个场景</span></p>`;
  tcs.forEach((tc, i) => {
    const m = tc.meta||{}, scenario = m.scenario||tc.task_id||`scenario_${i+1}`, kind = m.scenario_kind||'';
    const pkts = tc.packet_sequence||[], ents = tc.entities||[], preds = (tc.oracle_prediction||{}).packet_predictions||[];
    html += `<div class="scenario-block"><div class="scenario-header"><h4>场景 ${i+1}: ${esc(scenario)}</h4>`;
    if (kind) html += `<span class="badge ${kind==='positive'?'badge-pass':'badge-fail'}">${kind}</span>`;
    html += `</div>`;
    if (pkts.length) {
      html += `<table><tr><th>#</th><th>主机</th><th>协议</th><th>目的IP</th><th>Flags</th></tr>`;
      pkts.forEach(p => {
        const f=p.fields||{};
        html += `<tr><td>${p.packet_id||''}</td><td>${p.tx_host||''}</td><td>${(p.protocol_stack||[]).join('/')}</td><td>${f['IPv4.dst']||''}</td><td>${f['TCP.flags']||''}</td></tr>`;
      });
      html += `</table>`;
    }
    if (preds.length) {
      html += `<div style="margin-top:6px;font-size:12px;color:var(--dim);">Oracle:</div><table><tr><th>Pkt</th><th>预期</th><th>接收</th></tr>`;
      preds.forEach(pr => {
        const c = pr.expected_outcome==='deliver'?'var(--green)':'var(--red)';
        html += `<tr><td>#${pr.packet_id||''}</td><td style="color:${c}">${pr.expected_outcome||''}</td><td>${pr.expected_rx_host||'—'}</td></tr>`;
      });
      html += `</table>`;
    }
    html += `</div>`;
  });
  content.innerHTML = html;
}

// ---- Stage 3+4: Auto Test ----
async function runAutoTest() {
  if (!currentTaskId) return;
  setBtnLoading('btnRunTest', true);
  const sec = document.getElementById('testSection'); sec.classList.remove('hidden');
  const progress = document.getElementById('testProgress');
  progress.innerHTML = '<div class="step-line"><span class="spinner"></span> 正在启动自动测试...</div>';

  try {
    await fetch('/api/test/run', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({task_id:currentTaskId}) });
    const es = new EventSource(`/api/test/stream/${currentTaskId}`);
    es.addEventListener('step', e => {
      const s = JSON.parse(e.data);
      const cls = s.status==='done'?'done':(s.status==='error'?'error':'');
      progress.innerHTML += `<div class="step-line">[${s.step_id}] <span class="action">${esc(s.action||s.thought?.substring(0,50)||'...')}</span> <span class="${cls}">${s.status}</span></div>`;
      progress.scrollTop = progress.scrollHeight;
    });
    es.addEventListener('complete', e => { es.close(); currentTask = JSON.parse(e.data); showVerdict(currentTask); setBtnLoading('btnRunTest',false); loadHistory(); });
    es.addEventListener('error', () => { es.close(); progress.innerHTML += '<div class="step-line error">连接中断</div>'; setBtnLoading('btnRunTest',false); });
  } catch (e) { progress.innerHTML += `<div class="step-line error">${esc(e.message)}</div>`; setBtnLoading('btnRunTest',false); }
}

function showVerdict(task) {
  const div = document.getElementById('testVerdict');
  const v = task.test_verdict;
  if (!v) { div.innerHTML = '<p style="color:var(--dim);">无判定结果</p>'; return; }
  const cls = v.overall==='PASS'?'verdict-pass':'verdict-fail';
  const color = v.overall==='PASS'?'var(--green)':(v.overall==='FAIL'?'var(--red)':'var(--yellow)');
  let html = `<div class="verdict-box ${cls}"><h3 style="color:${color};margin-bottom:6px;">测试结论: ${v.overall}</h3>`;
  if (v.per_packet?.length) {
    html += `<table><tr><th>Pkt</th><th>预期</th><th>实际</th><th></th></tr>`;
    v.per_packet.forEach(pv => { const ic=pv.match?'✓':'✗', c=pv.match?'var(--green)':'var(--red)'; html += `<tr><td>#${pv.packet_id}</td><td>${esc(pv.expected_outcome)}</td><td>${esc(pv.actual_outcome)}</td><td style="color:${c}">${ic}</td></tr>`; });
    html += `</table>`;
  }
  if (v.reasoning) html += `<p style="margin-top:8px;font-size:12px;color:var(--dim);">${esc(v.reasoning)}</p>`;
  html += `</div>`;
  div.innerHTML = html;
}

// ---- History sidebar ----
async function loadHistory() {
  try {
    const resp = await fetch('/api/history');
    const items = await resp.json();
    const list = document.getElementById('historyList');
    if (!items.length) { list.innerHTML = '<div style="padding:12px;color:var(--dim);font-size:12px;">暂无记录</div>'; return; }
    list.innerHTML = items.map(it => {
      const active = it.task_id === currentTaskId ? ' active' : '';
      let badges = '';
      if (it.has_spec) badges += `<span class="badge ${it.spec_ok?'badge-pass':'badge-warn'}" style="font-size:10px;">LTL</span>`;
      if (it.testcase_count) badges += `<span class="badge badge-info" style="font-size:10px;">${it.testcase_count} 用例</span>`;
      if (it.test_verdict) badges += `<span class="badge ${it.test_verdict==='PASS'?'badge-pass':'badge-fail'}" style="font-size:10px;">${it.test_verdict}</span>`;
      const time = it.created_at ? new Date(it.created_at).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
      return `<div class="history-item${active}" onclick="loadTask('${it.task_id}')">
        <div class="hi-prog">${esc(it.program_name)}</div>
        <div class="hi-intent">${esc(it.intent_short)}</div>
        <div class="hi-badges">${badges}</div>
        <div class="hi-time">${time}</div>
      </div>`;
    }).join('');
  } catch (e) {}
}

async function loadTask(taskId) {
  try {
    const resp = await fetch(`/api/task/${taskId}`);
    const task = await resp.json();
    currentTaskId = task.task_id; currentTask = task;
    document.getElementById('taskIdDisplay').textContent = 'Task: ' + task.task_id;
    // Show results
    if (task.ltl_spec_text !== null || task.ltl_spec_text !== undefined) showSpecResult(task);
    if (task.testcases && task.testcases.length) showTestcases(task);
    if (task.test_verdict) { document.getElementById('testSection').classList.remove('hidden'); showVerdict(task); }
    loadHistory();
  } catch (e) {}
}

function resetToNew() {
  currentTaskId = null; currentTask = null; uploadedCaseId = null;
  document.getElementById('taskIdDisplay').textContent = '';
  document.getElementById('specSection').classList.add('hidden');
  document.getElementById('tcSection').classList.add('hidden');
  document.getElementById('testSection').classList.add('hidden');
  document.getElementById('caseSelect').value = '';
  document.getElementById('intentText').value = '';
  document.getElementById('compileResult').classList.add('hidden');
  switchInputTab('preset');
  loadHistory();
}

// ---- Utils ----
function setBtnLoading(id, loading) {
  const b = document.getElementById(id); b.disabled = loading;
  if (loading) { b.dataset.origText = b.textContent; b.innerHTML = '<span class="spinner"></span> 处理中...'; }
  else b.textContent = b.dataset.origText || b.textContent;
}
function copySpec() { navigator.clipboard.writeText(document.getElementById('specText').textContent).then(()=>alert('已复制')); }
function exportTestcases() {
  if (!currentTask?.testcases) return;
  const b = new Blob([JSON.stringify(currentTask.testcases, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `testcases_${currentTaskId}.json`; a.click();
}
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

init();
</script>
